---
name: Build disk images

on:
  workflow_dispatch:
    inputs:
      platform:
        required: true
        type: choice
        default: amd64
        options:
          - amd64
          - arm64
  workflow_run:
    workflows: ["Build container image"]
    types:
      - completed
    branches:
      - main

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build qcow2
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build qcow2
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ./disk_config/disk.toml
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          chown: "1001:127"
          types: qcow2
          additional-args: --use-librepo=True --rootfs ext4

      - name: Push qcow2 to GHCR as OCI artifact
        env:
          OUTPUT_DIR: ${{ steps.build.outputs.output-directory }}
        run: |
          QCOW2=$(find "${OUTPUT_DIR}" -name '*.qcow2' | head -1)
          if [ -z "${QCOW2}" ]; then
            echo "No qcow2 found in output"
            exit 1
          fi
          ls -lh "${QCOW2}"
          # Wrap qcow2 in a minimal container image and push to GHCR
          # This avoids GitHub Releases' 2GB limit (GHCR has no per-layer limit)
          cat > /tmp/Containerfile.disk <<'DOCKERFILE'
          FROM scratch
          COPY disk.qcow2 /disk.qcow2
          DOCKERFILE
          cp "${QCOW2}" /tmp/disk.qcow2
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
          sudo podman build -t "${IMAGE_REGISTRY}/${IMAGE_NAME}:disk" -f /tmp/Containerfile.disk /tmp
          sudo podman push "${IMAGE_REGISTRY}/${IMAGE_NAME}:disk"
          echo "Pushed ${IMAGE_REGISTRY}/${IMAGE_NAME}:disk"
